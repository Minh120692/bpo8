<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    main {
      width: min(92vw, 520px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    a {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #ffffff;
      color: #111827;
      font-size: 24px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      border-color: #2563eb;
      box-shadow: 0 14px 32px rgba(31, 41, 55, 0.14);
      outline: none;
    }

    @media (max-width: 520px) {
      main {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 96px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Danh sach website">
    <a href="index.html">web1</a>
    <a href="templateBPO8/index.html">web2</a>
  </main>
</body>
</html>
